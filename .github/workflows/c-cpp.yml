name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ] # Triggers a formal Release when you push a tag like v1.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Manual Submodule Setup
      run: |
        git submodule update --init --recursive

    - name: Install Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 binutils-mingw-w64 p7zip-full autoconf automake libtool pkg-config texinfo

    - name: Run Build Script
      run: |
        chmod +x ./build.sh
        ./build.sh

    - name: Prepare Release Package
      run: |
        cd output && zip -r ../openocd-jrunner.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openocd-jrunner
        path: output/openocd-jrunner.zip

    - name: Create GitHub Release (Only on Tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: openocd-jrunner-win32.zip
        body: "Automated OpenOCD-JRunner Build"
